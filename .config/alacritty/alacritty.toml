[general]
import = [
    "/home/winny/dotfiles/.config/alacritty/themes/themes/oxocarbon.toml"
]

[terminal.shell]
args = ['--login']
program = "/usr/bin/zsh"

[cursor.style]
shape = "Block"
blinking = "On"


[font]
size = 8.0

[font.offset]
y = 2 
x = 1

[font.normal]
family = "ZedMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "ZedMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "ZedMono Nerd Font Mono"
style = "Italic"

[window]
# startup_mode = "Fullscreen"
dynamic_padding=true
opacity = 1 

[window.padding]
x = 0
y = 0

